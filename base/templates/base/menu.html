<nav class="navbar">
    <a class="brand" href="{% url 'index' %}">📚 Boekclub</a>
    <div class="nav-links">
        <a href="{% url 'index' %}">Home</a>
        {% if user.is_authenticated %}
            <a href="{% url 'boek_toevoegen' %}">Boek voorstellen</a>
            {% if user.is_staff %}
                <a href="{% url 'boeken_beheer' %}">Boeken goedkeuren</a>
            {% endif %}
            <a href="{% url 'profiel' %}">Profiel</a>
            <a href="{% url 'boeken_overzicht' %}">Boeken</a>
            <a href="{% url 'leesmoment_toevoegen' %}">Leesmoment toevoegen</a>
            <a href="{% url 'newsfeed' %}">Newsfeed</a>
            <span class="nav-user">Hoi, {{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="link-button">Uitloggen</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Inloggen</a>
            <a href="{% url 'register' %}">Registreren</a>
        {% endif %}
    </div>
</nav>
